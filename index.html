<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12-Week Learning Program</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0b1120;
  --bg-card: #111827;
  --bg-card-hover: #1a2332;
  --bg-surface: #1e293b;
  --border: rgba(148,163,184,0.1);
  --border-active: rgba(99,179,237,0.4);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-emerald: #10b981;
  --accent-amber: #f59e0b;
  --accent-rose: #f43f5e;
  --accent-violet: #8b5cf6;
  --accent-orange: #f97316;
  --gradient-hero: linear-gradient(135deg, #1e3a5f 0%, #0b1120 50%, #1a1040 100%);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
.hero {
  background: var(--gradient-hero);
  padding: 36px 20px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(59,130,246,0.12), transparent);
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -40px;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.1), transparent);
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
  background: linear-gradient(135deg, #e2e8f0, #93c5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero p {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}
/* Child Selector */
.child-selector {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
}
.child-btn {
  flex:1; padding: 14px 12px;
  border: none; background: transparent;
  color: var(--text-muted);
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.25s;
}
.child-btn.active {
  color: var(--accent-cyan);
  border-bottom-color: var(--accent-cyan);
  background: rgba(6,182,212,0.05);
}
/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  flex: 0 0 auto;
  padding: 11px 16px;
  border: none; background: transparent;
  color: var(--text-muted);
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab.active {
  color: var(--accent-blue);
  border-bottom-color: var(--accent-blue);
}
/* Week Selector */
.week-nav {
  display: flex;
  gap: 6px;
  padding: 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.week-pill {
  flex: 0 0 auto;
  min-width: 44px;
  padding: 8px 6px;
  border-radius: 10px;
  border: 1.5px solid transparent;
  background: rgba(255,255,255,0.04);
  color: var(--text-muted);
  font-family: inherit; font-size: 11px; font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.week-pill.active {
  border-color: var(--accent-blue);
  background: rgba(59,130,246,0.12);
  color: var(--accent-blue);
}
.week-pill.completed {
  background: rgba(16,185,129,0.1);
  border-color: rgba(16,185,129,0.3);
  color: var(--accent-emerald);
}
/* Content area */
.content { padding: 0 14px 100px; }
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 800;
  margin: 20px 0 14px;
  color: var(--text-primary);
}
.day-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.day-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.day-header:hover { background: var(--bg-card-hover); }
.day-name {
  font-weight: 700; font-size: 15px;
  display: flex; align-items: center; gap: 10px;
}
.day-name .emoji { font-size: 22px; }
.day-theme { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-left: 32px; margin-top: 2px; }
.day-score { font-size: 12px; font-weight: 700; color: var(--text-muted); }
.day-body { padding: 0 16px 16px; display: none; }
.day-body.open { display: block; }
.task-item {
  background: var(--bg-surface);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
  border-left: 3px solid var(--text-muted);
  transition: all 0.2s;
}
.task-item.done { border-left-color: var(--accent-emerald); opacity: 0.7; }
.task-area {
  display: inline-block;
  font-size: 9px; font-weight: 800;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.area-reading { background: rgba(245,158,11,0.15); color: var(--accent-amber); border-left-color: var(--accent-amber); }
.area-email { background: rgba(59,130,246,0.15); color: var(--accent-blue); border-left-color: var(--accent-blue); }
.area-ai { background: rgba(139,92,246,0.15); color: var(--accent-violet); border-left-color: var(--accent-violet); }
.area-logic { background: rgba(6,182,212,0.15); color: var(--accent-cyan); border-left-color: var(--accent-cyan); }
.area-notes { background: rgba(16,185,129,0.15); color: var(--accent-emerald); border-left-color: var(--accent-emerald); }
.area-project { background: rgba(249,115,22,0.15); color: var(--accent-orange); border-left-color: var(--accent-orange); }
.area-fun { background: rgba(244,63,94,0.15); color: var(--accent-rose); border-left-color: var(--accent-rose); }
.area-review { background: rgba(139,92,246,0.15); color: var(--accent-violet); border-left-color: var(--accent-violet); }
.task-desc { font-size: 13px; line-height: 1.6; color: var(--text-secondary); margin: 6px 0 10px; }
.task-detail { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
.task-check {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.task-check:hover { background: rgba(255,255,255,0.07); }
.task-check .box {
  width: 20px; height: 20px;
  border-radius: 5px;
  border: 2px solid var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  transition: all 0.2s;
  flex-shrink: 0;
}
.task-check.checked .box {
  border-color: var(--accent-emerald);
  background: rgba(16,185,129,0.2);
  color: var(--accent-emerald);
}
.task-check .label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
.task-check.checked .label { color: var(--accent-emerald); }
/* KPI Panel */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.kpi-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 14px;
  text-align: center;
}
.kpi-box .val {
  font-family: 'Playfair Display', serif;
  font-size: 36px; font-weight: 900;
}
.kpi-box .lbl { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-top: 4px; }
.kpi-full {
  grid-column: 1 / -1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
}
.progress-bar {
  height: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 5px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-bar .fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.5s ease;
}
.rating-badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px; font-weight: 700;
  margin-top: 8px;
}
.rating-excellent { background: rgba(16,185,129,0.15); color: var(--accent-emerald); }
.rating-good { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
.rating-needs { background: rgba(244,63,94,0.15); color: var(--accent-rose); }
/* Notes */
.notes-form {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
}
.notes-form label {
  display: block;
  font-size: 12px; font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 6px; margin-top: 14px;
}
.notes-form label:first-child { margin-top: 0; }
.notes-form select, .notes-form textarea {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text-primary);
  font-family: inherit; font-size: 13px;
  resize: vertical;
}
.notes-form textarea { min-height: 60px; }
.notes-form select:focus, .notes-form textarea:focus {
  outline: none; border-color: var(--accent-blue);
}
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px;
  border: none; border-radius: 10px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent-blue); color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-emerald { background: var(--accent-emerald); color: #fff; }
.btn-rose { background: rgba(244,63,94,0.15); color: var(--accent-rose); border: 1px solid rgba(244,63,94,0.2); }
.saved-note {
  background: var(--bg-surface);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border-left: 3px solid var(--accent-emerald);
}
.saved-note .meta { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
.saved-note .field { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; line-height: 1.5; }
.saved-note .field strong { color: var(--text-primary); font-weight: 600; }
/* Weekly report */
.report-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
}
.report-section h4 { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--text-primary); }
.report-section textarea {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text-primary);
  font-family: inherit; font-size: 13px;
  resize: vertical;
  min-height: 50px;
}
.report-section textarea:focus { outline: none; border-color: var(--accent-blue); }
/* Submission */
.submission-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
}
.sub-status {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase;
}
.sub-required { background: rgba(244,63,94,0.12); color: var(--accent-rose); }
.sub-optional { background: rgba(148,163,184,0.12); color: var(--text-muted); }
.sub-done { background: rgba(16,185,129,0.12); color: var(--accent-emerald); }
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text-muted); font-size: 13px;
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
@keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
.animate-in { animation: fadeIn 0.3s ease; }
/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.2); border-radius: 4px; }
</style>

  const aiTasks10 = [
    ["Ask AI: 'Explain gravity like I'm 10.' Draw what you understand.","Ask AI: 'Give me 5 facts about volcanoes.' Pick the most surprising one and explain why.","Ask AI to help you write a short story opening (3 sentences). Change 3 words to make it yours.","Ask AI: 'What are 3 ways kids can save water?' Make a poster with the best idea."],
    ["Ask AI: 'How do fish breathe underwater?' Write 3 sentences in your own words.","Ask AI: 'Create a word puzzle about animals.' Solve it yourself.","Ask AI: 'Tell me about ancient Egypt.' Pick 1 fact and teach it to someone.","Ask AI: 'Help me describe a rainy day using all 5 senses.' Edit the result."],

    ["Ask AI: 'What does a pilot need to learn?' Would you want this job? Why?","Ask AI: 'Help me plan a weekend trip for my family.' Add your own ideas.","Ask AI: 'Explain what robots can and can't do.' Write your opinion.","Ask AI: 'Create a word search about healthy foods.' Solve it."],

    [

// ============================
// HELPER FUNCTIONS
// ============================
function kpiKey(task, day) {
  return `${state.child}-${state.week}-${day}-${task}`;
}

function isChecked(task, day) {
  return !!state.kpis[kpiKey(task, day)];
}

function toggleKpi(task, day) {
  const k = kpiKey(task, day);
  state.kpis[k] = !state.kpis[k];
  saveState();
  render();
}

function getDayScore(day) {
  const dayData = CURRICULUM[state.week].days[day];
  if (!dayData) return { earned: 0, total: 0 };
  if (dayData.type === "core") {
    const tasks = ["reading","email","ai","logic","notes"];
    const points = [1,2,1,1,1];
    let earned = 0, total = 6;
    tasks.forEach((t,i) => { if (isChecked(t, day)) earned += points[i]; });
    return { earned, total };
  }
  if (dayData.type === "project") {
    return { earned: isChecked("project", day) ? 4 : 0, total: 4 };
  }
  if (dayData.type === "light") {
    return { earned: isChecked("activity", day) ? 2 : 0, total: 2 };
  }
  if (dayData.type === "review") {
    return { earned: isChecked("review", day) ? 2 : 0, total: 2 };
  }
  return { earned: 0, total: 0 };
}

function getWeekScore(weekIdx) {
  const saved = state.week;
  state.week = weekIdx;
  const dayNames = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  let total = 0, earned = 0;
  dayNames.forEach(d => {
    const s = getDayScore(d);
    total += s.total; earned += s.earned;
  });
  state.week = saved;
  return { earned, total };
}

function getRating(score) {
  if (score >= 25) return { text: "Excellent ⭐", cls: "rating-excellent" };
  if (score >= 20) return { text: "Good 👍", cls: "rating-good" };
  return { text: "Needs Improvement 📈", cls: "rating-needs" };
}

function getChildLabel() {
  return state.child === 0 ? "Age 10" : "Age 12";
}

function getChildKey() {
  return state.child === 0 ? "age10" : "age12";
}

}

function renderHero() {

function renderTabs() {

    {id:"submissions",label:"📤 Submit"},

function renderWeekNav() {
  let html = '<div class="week-nav">';

function renderKPI() {
  const ws = getWeekScore(state.week);
  const rating = getRating(ws.earned);

  // Calculate area breakdown
  const dayNames = ["Monday","Tuesday","Wednesday","Thursday"];
  let areaScores = {reading:0,email:0,ai:0,logic:0,notes:0};
  let areaTotals = {reading:4,email:8,ai:4,logic:4,notes:4};
  dayNames.forEach(d => {
    if (isChecked("reading",d)) areaScores.reading += 1;
    if (isChecked("email",d)) areaScores.email += 2;
    if (isChecked("ai",d)) areaScores.ai += 1;
    if (isChecked("logic",d)) areaScores.logic += 1;
    if (isChecked("notes",d)) areaScores.notes += 1;
  });

  let streakDays = 0;
  const allDays = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  for (const d of allDays) {
    const s = getDayScore(d);
    if (s.earned === s.total && s.total > 0) streakDays++;
    else break;
  }

  return `
    <h2 class="section-title">Week ${state.week+1} — KPI Dashboard</h2>
    <div class="kpi-grid">
      <div class="kpi-box">
        <div class="val" style="color:var(--accent-cyan);">${ws.earned}</div>
        <div class="lbl">Points Earned</div>
      </div>
      <div class="kpi-box">
        <div class="val" style="color:var(--accent-amber);">${ws.total}</div>
        <div class="lbl">Points Possible</div>
      </div>
      <div class="kpi-box">
        <div class="val" style="color:var(--accent-emerald);">${streakDays}</div>
        <div class="lbl">Day Streak 🔥</div>
      </div>
      <div class="kpi-box">
        <div class="val" style="color:var(--accent-violet);">${Math.round((ws.earned/ws.total)*100)||0}%</div>
        <div class="lbl">Completion</div>
      </div>
    </div>

    <div class="kpi-full">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-weight:700;font-size:14px;">Weekly Rating</div>
        <span class="rating-badge ${rating.cls}">${rating.text}</span>
      </div>
      <div class="progress-bar" style="margin-top:12px;">
        <div class="fill" style="width:${Math.round((ws.earned/30)*100)}%; background:${ws.earned>=25?'var(--accent-emerald)':ws.earned>=20?'var(--accent-blue)':'var(--accent-rose)'};"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;">
        <span style="font-size:10px;color:var(--accent-rose);">&lt;20 Needs work</span>
        <span style="font-size:10px;color:var(--accent-blue);">20-25 Good</span>
        <span style="font-size:10px;color:var(--accent-emerald);">25-30 Excellent</span>
      </div>
    </div>

    <div style="margin-top:16px;">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">Area Breakdown (Mon–Thu)</h3>
      ${renderAreaBar("📖 Reading", areaScores.reading, areaTotals.reading, "var(--accent-amber)")}
      ${renderAreaBar("✉️ Email", areaScores.email, areaTotals.email, "var(--accent-blue)")}
      ${renderAreaBar("🤖 AI Learning", areaScores.ai, areaTotals.ai, "var(--accent-violet)")}
      ${renderAreaBar("🧩 Logic", areaScores.logic, areaTotals.logic, "var(--accent-cyan)")}
      ${renderAreaBar("📝 Notes", areaScores.notes, areaTotals.notes, "var(--accent-emerald)")}
    </div>

    <div style="margin-top:20px;">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">12-Week Progress</h3>
      ${renderWeeklyChart()}
    </div>
  `;
}

function renderAreaBar(label, earned, total, color) {
  const pct = Math.round((earned/total)*100);
  return `
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:12px;font-weight:600;">${label}</span>
        <span style="font-size:12px;font-weight:700;color:${color};">${earned}/${total}</span>
      </div>
      <div class="progress-bar">
        <div class="fill" style="width:${pct}%;background:${color};"></div>
      </div>
    </div>
  `;
}

function renderWeeklyChart() {
  let html = '<div style="display:flex;gap:4px;align-items:flex-end;height:100px;padding:8px 0;">';
  for (let i = 0; i < 12; i++) {
    const ws = getWeekScore(i);
    const pct = ws.total > 0 ? (ws.earned / 30) * 100 : 0;
    const color = ws.earned >= 25 ? 'var(--accent-emerald)' : ws.earned >= 20 ? 'var(--accent-blue)' : ws.earned > 0 ? 'var(--accent-amber)' : 'rgba(255,255,255,0.08)';
    html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div style="font-size:9px;color:var(--text-muted);font-weight:700;">${ws.earned}</div>
      <div style="width:100%;height:${Math.max(pct,4)}%;background:${color};border-radius:4px 4px 0 0;min-height:3px;transition:height 0.3s;"></div>
      <div style="font-size:8px;color:${state.week===i?'var(--accent-cyan)':'var(--text-muted)'};font-weight:${state.week===i?800:600};">W${i+1}</div>
    </div>`;
  }
  html += '</div>';
  return html;
}

// ---- NOTES TAB ----
function renderNotes() {
  const childNotes = state.notes.filter(n => n.child === state.child && n.week === state.week);

  return `
    <h2 class="section-title">Week ${state.week+1} — Reflection Notes</h2>

    <div class="notes-form" id="notesForm">
      <label>📌 Task Area</label>
      <select id="noteTask">
        <option value="Reading">Reading</option>
        <option value="Email">Email Writing</option>
        <option value="AI">AI Learning</option>
        <option value="Logic">Logic / Problem Solving</option>
        <option value="Project">Friday Project</option>
      </select>

      <label>📋 What I did</label>
      <textarea id="noteDid" placeholder="Describe what you worked on..."></textarea>

      <label>💡 What I learned</label>
      <textarea id="noteLearned" placeholder="What new things did you discover?"></textarea>

      <label>⚡ What was difficult</label>
      <textarea id="noteDifficult" placeholder="What challenged you?"></textarea>

      <label>📈 My improvement</label>
      <textarea id="noteImprovement" placeholder="How will you do better next time?"></textarea>

      <div style="margin-top:16px;display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="saveNote()">💾 Save Note</button>
      </div>
    </div>

    <h3 style="font-size:14px;font-weight:700;margin:20px 0 12px;">Saved Notes (${childNotes.length})</h3>
    ${childNotes.length === 0 ? '<div class="empty-state"><div class="icon">📝</div>No notes yet. Fill out the form above!</div>' :
      childNotes.map((n,i) => `
        <div class="saved-note">
          <div class="meta">${n.task} · ${new Date(n.timestamp).toLocaleDateString()} ${new Date(n.timestamp).toLocaleTimeString()}</div>
          <div class="field"><strong>Did:</strong> ${n.did}</div>
          <div class="field"><strong>Learned:</strong> ${n.learned}</div>
          <div class="field"><strong>Difficult:</strong> ${n.difficult}</div>
          <div class="field"><strong>Improvement:</strong> ${n.improvement}</div>
          <button class="btn btn-rose" style="margin-top:8px;padding:6px 12px;font-size:11px;" onclick="deleteNote(${i})">🗑️ Delete</button>
        </div>
      `).join('')
    }
  `;
}

// ---- SUBMISSIONS TAB ----
function renderSubmissions() {
  const dayNames = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const required = ["Reading Summary","Email Writing","Notes"];
  const optional = ["AI Work","Logic Answers"];

  let html = `<h2 class="section-title">Week ${state.week+1} — Submissions</h2>
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;">📤 Submission Checklist</div>
      <div style="font-size:12px;color:var(--text-secondary);line-height:1.7;">
        After completing tasks each day, check off what you've submitted. Required items are marked in red; optional items are gray.
      </div>
    </div>`;

  dayNames.forEach(dayName => {
    const dayData = CURRICULUM[state.week].days[dayName];
    if (dayData.type !== "core") {
      if (dayData.type === "project") {
        const sk = `${state.child}-${state.week}-${dayName}-project-sub`;
        const done = !!state.submissions[sk];
        html += `<div class="submission-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <span style="font-weight:700;">🛠️ ${dayName}</span>
            <span class="sub-status ${done?'sub-done':'sub-required'}">${done?'Done':'Required'}</span>
          </div>
          <div class="task-check ${done?'checked':''}" onclick="toggleSub('${sk}')">
            <span class="box">${done?'✓':''}</span>
            <span class="label">Project + Summary uploaded</span>
          </div>
        </div>`;
      }
      return;
    }

    html += `<div class="submission-card">
      <div style="font-weight:700;margin-bottom:10px;">📅 ${dayName}</div>`;

    required.forEach(item => {
      const sk = `${state.child}-${state.week}-${dayName}-${item}`;
      const done = !!state.submissions[sk];
      html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div class="task-check ${done?'checked':''}" onclick="toggleSub('${sk}')" style="flex:1;">
          <span class="box">${done?'✓':''}</span>
          <span class="label">${item}</span>
        </div>
        <span class="sub-status sub-required" style="margin-left:8px;">Required</span>
      </div>`;
    });

    optional.forEach(item => {
      const sk = `${state.child}-${state.week}-${dayName}-${item}`;
      const done = !!state.submissions[sk];
      html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div class="task-check ${done?'checked':''}" onclick="toggleSub('${sk}')" style="flex:1;">
          <span class="box">${done?'✓':''}</span>
          <span class="label">${item}</span>
        </div>
        <span class="sub-status sub-optional" style="margin-left:8px;">Optional</span>
      </div>`;
    });

    html += `</div>`;
  });

  return html;
}

// ---- REPORT TAB ----
function renderReport() {
  const fields = [
    {id:"learned", label:"📚 What I learned this week", emoji:"📚"},
    {id:"best", label:"⭐ My best task", emoji:"⭐"},
    {id:"mistake", label:"💪 My biggest mistake / challenge", emoji:"💪"},
    {id:"target", label:"🎯 My target for next week", emoji:"🎯"}
  ];

  const ws = getWeekScore(state.week);
  const rating = getRating(ws.earned);

  return `
    <h2 class="section-title">Week ${state.week+1} — Weekly Report</h2>

    <div class="kpi-full" style="margin-bottom:16px;text-align:center;">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;">Week ${state.week+1} Score</div>
      <div style="font-family:'Playfair Display',serif;font-size:42px;font-weight:900;color:var(--accent-cyan);">${ws.earned}<span style="font-size:20px;color:var(--text-muted);">/${ws.total}</span></div>
      <span class="rating-badge ${rating.cls}" style="margin-top:12px;">${rating.text}</span>
    </div>

    ${fields.map(f => {
      const rk = `${state.child}-${state.week}-${f.id}`;
      const val = state.reports[rk] || '';
      return `<div class="report-section">
        <h4>${f.label}</h4>
        <textarea id="report_${f.id}" placeholder="Write here..." onchange="saveReport('${f.id}', this.value)">${val}</textarea>
      </div>`;
    }).join('')}

    <div style="text-align:center;margin-top:20px;">
      <button class="btn btn-emerald" onclick="completeReview()">✅ Mark Review Complete</button>
    </div>

    <div style="margin-top:24px;">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">Past Weekly Reports</h3>
      ${renderPastReports()}
    </div>
  `;
}

function renderPastReports() {
  let html = '';
  for (let w = 0; w < 12; w++) {
    const hasContent = ["learned","best","mistake","target"].some(f => state.reports[`${state.child}-${w}-${f}`]);
    if (!hasContent) continue;
    const ws = getWeekScore(w);
    html += `<div class="saved-note" style="border-left-color:var(--accent-violet);">
      <div class="meta">Week ${w+1} · Score: ${ws.earned}/${ws.total}</div>`;
    ["learned","best","mistake","target"].forEach(f => {
      const val = state.reports[`${state.child}-${w}-${f}`];
      if (val) html += `<div class="field"><strong>${f}:</strong> ${val}</div>`;
    });
    html += `</div>`;
  }
  return html || '<div class="empty-state"><div class="icon">📑</div>No reports yet.</div>';
}

// ============================
// EVENT HANDLERS
// ============================
function switchChild(c) { state.child = c; render(); }
function switchTab(t) { state.tab = t; render(); }
function switchWeek(w) { state.week = w; state.openDay = null; render(); }
function toggleDay(d) { state.openDay = state.openDay === d ? null : d; render(); }

function saveNote() {
  const note = {
    child: state.child,
    week: state.week,
    task: document.getElementById('noteTask').value,
    did: document.getElementById('noteDid').value,
    learned: document.getElementById('noteLearned').value,
    difficult: document.getElementById('noteDifficult').value,
    improvement: document.getElementById('noteImprovement').value,
    timestamp: Date.now()
  };
  if (!note.did && !note.learned) { alert("Please fill in at least 'What I did' and 'What I learned'."); return; }
  state.notes.push(note);
  saveState();
  render();
}

function deleteNote(index) {
  const childNotes = state.notes.filter(n => n.child === state.child && n.week === state.week);
  const noteToDelete = childNotes[index];
  state.notes = state.notes.filter(n => n !== noteToDelete);
  saveState();
  render();
}

function toggleSub(key) {
  state.submissions[key] = !state.submissions[key];
  saveState();
  render();
}

function saveReport(field, value) {
  state.reports[`${state.child}-${state.week}-${field}`] = value;
  saveState();
}

function completeReview() {
  toggleKpi('review', 'Sunday');
}

function attachEvents() {
  // Events attached inline via onclick
}

// ============================
// MAKE FUNCTIONS GLOBAL
// ============================
window.switchChild = switchChild;
window.switchTab = switchTab;
window.switchWeek = switchWeek;
window.toggleDay = toggleDay;
window.toggleKpi = toggleKpi;
window.saveNote = saveNote;
window.deleteNote = deleteNote;
window.toggleSub = toggleSub;
window.saveReport = saveReport;
window.completeReview = completeReview;

// Initial render
render();
</script>
</body>
</html>
